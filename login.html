<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0"/>

  <title>Login</title>

  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav>

    <div class="logo">
      StayEase
    </div>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>

  </nav>

  <section class="form-page">

    <div class="form-container">

      <h2>User Login</h2>

      <form id="loginForm">

        <input
          type="email"
          id="email"
          placeholder="Enter Email"
          required
        />

        <input
          type="password"
          id="password"
          placeholder="Enter Password"
          required
        />

        <button type="submit">
          Login
        </button>

      </form>

    </div>

  </section>

  <script src="js/auth.js"></script>

</body>
</html>
